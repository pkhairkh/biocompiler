name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Python test matrix
  # ──────────────────────────────────────────────
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Type-check with mypy
        run: |
          mypy src/biocompiler --ignore-missing-imports || true
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          pytest --tb=short -q --cov=biocompiler --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────
  # Lean4 proof checking
  # ──────────────────────────────────────────────
  lean4-proofs:
    name: Lean4 Proofs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lean4 / Lake
        uses: leanprover/lean-action@v1
        with:
          lean-toolchain: leanprover/lean4:v4.30.0
          workdir: proof
        continue-on-error: true

      - name: Check Lean4 proofs (proof/)
        working-directory: proof
        run: |
          lake exe cache get || true
          lake build
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Docker build verification
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t biocompiler-ci .
        continue-on-error: true

  # ──────────────────────────────────────────────
  # CI gate – all jobs must pass
  # ──────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    if: always()
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Check test result
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "::error::Python tests failed"
            exit 1
          fi
          echo "All CI checks passed"
