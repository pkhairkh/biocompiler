name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Lint and type-check (fast feedback)
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Type check with mypy
        run: python -m mypy src/biocompiler --ignore-missing-imports || true

  # ──────────────────────────────────────────────
  # Core test matrix (Python 3.10 / 3.11 / 3.12 × Ubuntu / macOS)
  # ──────────────────────────────────────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=biocompiler --cov-report=term-missing --cov-report=xml
        env:
          PYTHONDONTWRITEBYTECODE: 1

      - name: Run CLI smoke test
        run: |
          biocompiler --version
          biocompiler scan --sequence ATGGTGCATCTGACTCCTGAGGAGAAGTCTGCCGTTACTGCCCTGTGGGGCAAGGTGAACGTGGATGAAGTTGGTGGTGAGGCCCTGGGCAG

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # Optional dependency: optimizer (z3-solver)
  # ──────────────────────────────────────────────
  test-optimizer:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with optimizer extras
        run: |
          pip install -e ".[dev,optimizer]"
      - name: Run full test suite with z3
        run: |
          python -m pytest tests/ -v --tb=short
      - name: Verify z3 import
        run: |
          python -c "import z3; print(f'z3-solver version: {z3.get_version_string()}')"

  # ──────────────────────────────────────────────
  # Optional dependency: parsing (beautifulsoup4)
  # ──────────────────────────────────────────────
  test-parsing:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with parsing extras
        run: |
          pip install -e ".[dev,parsing]"
      - name: Run full test suite with beautifulsoup4
        run: |
          python -m pytest tests/ -v --tb=short
      - name: Verify BS4 import
        run: |
          python -c "from bs4 import BeautifulSoup; print(f'BeautifulSoup4 available')"

  # ──────────────────────────────────────────────
  # Optional dependency: compare (dnachisel)
  # ──────────────────────────────────────────────
  test-compare:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with compare extras
        run: |
          pip install -e ".[dev,compare]"
      - name: Run full test suite with dnachisel
        run: |
          python -m pytest tests/ -v --tb=short
      - name: Verify dnachisel import
        run: |
          python -c "import dnachisel; print(f'DNA Chisel available')"

  # ──────────────────────────────────────────────
  # Optional dependency combination matrix
  # ──────────────────────────────────────────────
  test-extras-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        extras-combo:
          - "dev,optimizer,parsing"
          - "dev,optimizer,compare"
          - "dev,parsing,compare"
          - "dev,optimizer,parsing,compare"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with extras combo
        run: |
          pip install -e ".[${{ matrix.extras-combo }}]"
      - name: Run test suite
        run: |
          python -m pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # REST API tests
  # ──────────────────────────────────────────────
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,api]"
      - name: Run API-specific tests
        run: |
          python -m pytest tests/test_production_features.py::TestRESTAPI -v --tb=short
      - name: Test API with authentication
        env:
          BIOCOMPILER_API_KEY: "test-key-ci-12345"
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from biocompiler.api import app
          client = TestClient(app)
          # Health should work without auth
          r = client.get('/health')
          assert r.status_code == 200
          # Authenticated endpoints should require key
          r = client.post('/check', json={'sequence': 'ATGGTG'})
          assert r.status_code == 401
          # With correct key should work
          r = client.post('/check', json={'sequence': 'ATGGTG'}, headers={'X-API-Key': 'test-key-ci-12345'})
          # Accept both 200 and 422 (validation error for short sequence is fine)
          assert r.status_code in (200, 422)
          print('API authentication test passed')
          "

  # ──────────────────────────────────────────────
  # Docker build test
  # ──────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t biocompiler:test .
      - name: Test Docker container starts
        run: |
          docker run -d --name test-biocompiler -p 8001:8000 biocompiler:test
          sleep 5
          curl -s http://localhost:8001/health | python -m json.tool
          docker stop test-biocompiler
          docker rm test-biocompiler

  # ──────────────────────────────────────────────
  # Lean4 formal proof verification
  # This is a UNIQUE SELLING POINT of BioCompiler —
  # the soundness proof MUST be CI-verified.
  # ──────────────────────────────────────────────
  lean4-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean4 (elan)
        run: |
          curl -sL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: proof/.lake
          key: lean4-${{ runner.os }}-${{ hashFiles('proof/lakefile.lean', 'proof/lean-toolchain') }}
          restore-keys: lean4-${{ runner.os }}-

      - name: Build and verify proofs
        working-directory: proof
        run: |
          lake build 2>&1 | tee lake-build.log

          # Fail if lake build itself errored
          if grep -q "^error:" lake-build.log; then
            echo "::error::Lean4 proof verification FAILED — lake build reported errors"
            exit 1
          fi

          echo "Lean4 lake build completed successfully"

      - name: Verify 0 sorry, 0 axioms
        working-directory: proof
        run: |
          echo "=== Proof Integrity Audit ==="

          THEOREM_COUNT=$(grep -r "theorem\|lemma" BioCompiler/ --include="*.lean" | wc -l || true)
          echo "Theorems/lemmas found: $THEOREM_COUNT"

          SORRY_COUNT=$(grep -r "sorry" BioCompiler/ --include="*.lean" | wc -l || true)
          echo "Sorry count: $SORRY_COUNT"

          # Axiom count: match 'axiom' keyword but not inside comments or as part of other words
          AXIOM_COUNT=$(grep -rE "^\s*axiom\s" BioCompiler/ --include="*.lean" | wc -l || true)
          echo "Axiom count: $AXIOM_COUNT"

          if [ "$SORRY_COUNT" -ne "0" ]; then
            echo "::error::Found ${SORRY_COUNT} 'sorry' in proofs — proofs are incomplete!"
            exit 1
          fi

          if [ "$AXIOM_COUNT" -ne "0" ]; then
            echo "::warning::Found ${AXIOM_COUNT} axiom(s) in proofs — review if intentional"
            # Axioms are a warning, not a hard failure, since some may be intentional
          fi

          echo "=== Proof Verification PASSED: 0 sorry, $AXIOM_COUNT axioms ==="

      - name: Print proof summary
        working-directory: proof
        if: always()
        run: |
          echo "=== Lean4 Proof Modules ==="
          for f in BioCompiler/*.lean; do
            if [ -f "$f" ]; then
              BASENAME=$(basename "$f" .lean)
              THM=$(grep -c "theorem\|lemma" "$f" 2>/dev/null || echo "0")
              SORRY=$(grep -c "sorry" "$f" 2>/dev/null || echo "0")
              echo "  $BASENAME: $THM theorems, $SORRY sorry"
            fi
          done
