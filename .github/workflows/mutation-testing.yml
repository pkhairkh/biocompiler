name: Mutation Testing

on:
  # Run as a manual / workflow_dispatch job (not on every push — mutation tests take hours)
  workflow_dispatch:
    inputs:
      module:
        description: "Module to mutate (greedy, pipeline, biosecurity, or all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - greedy
          - pipeline
          - biosecurity
      timeout:
        description: "Timeout per mutant (seconds)"
        required: false
        default: "60"
        type: string

  # Also available as a scheduled weekly check (Sunday 04:00 UTC)
  schedule:
    - cron: "0 4 * * 0"

permissions:
  contents: read

jobs:
  mutation-testing:
    name: "Mutation Tests (${{ github.event.inputs.module || 'all' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max — mutation testing is slow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mutmut

      - name: Verify baseline test suite passes
        run: |
          python -m pytest tests/ -x -q -m "not slow" --timeout=60

      - name: Run mutation tests (all modules)
        if: github.event.inputs.module == 'all' || github.event.inputs.module == ''
        run: |
          python scripts/run_mutation_tests.py --timeout ${{ github.event.inputs.timeout || '60' }}

      - name: Run mutation tests (single module)
        if: github.event.inputs.module != 'all' && github.event.inputs.module != ''
        run: |
          python scripts/run_mutation_tests.py --module ${{ github.event.inputs.module }} --timeout ${{ github.event.inputs.timeout || '60' }}

      - name: Generate HTML report
        if: always()
        run: |
          python scripts/run_mutation_tests.py --html || true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutmut-report.html
          retention-days: 30

      - name: Clean up artifacts
        if: always()
        run: |
          python scripts/run_mutation_tests.py --clean
