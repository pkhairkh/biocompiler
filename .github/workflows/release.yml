name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Run full test suite before releasing
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  # ──────────────────────────────────────────────
  # Build & publish to PyPI
  # ──────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version matches pyproject.toml
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Version mismatch: tag v${TAG_VERSION} != pyproject.toml ${PYPROJECT_VERSION}"
            exit 1
          fi
          echo "Version verified: v${TAG_VERSION} == pyproject.toml ${PYPROJECT_VERSION}"

      - name: Generate changelog
        id: changelog
        run: |
          # Grab the latest tag before this one
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" 2>/dev/null || echo "Initial release")
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD~20..HEAD 2>/dev/null || echo "Initial release")
          fi
          # Write to file for multiline output
          echo "$CHANGES" > RELEASE_NOTES.md
          echo "Generated changelog:"
          echo "$CHANGES"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BioCompiler v${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # NOTE: PyPI publishing is handled by publish.yml (OIDC trusted publisher).
  # Do NOT add a publish job here to avoid duplicate uploads.
