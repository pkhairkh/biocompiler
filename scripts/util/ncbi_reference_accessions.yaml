# BioCompiler NCBI Reference Accession Database
# ===============================================
# Curated list of NCBI GenBank/RefSeq accession numbers for key pathogens,
# toxins, and hazardous organisms. Used by build_blast_databases.py to
# download full-length reference sequences for robust BLAST+ biosecurity
# screening.
#
# These are publicly available reference sequences from NCBI. They are
# used ONLY for screening/detection purposes and must NOT be used to
# construct functional hazardous agents.
#
# Categories follow the Australia Group Common Control List and CDC
# Select Agent Program (42 CFR Part 73).
#
# References:
#   - CDC Select Agent Program: https://www.selectagents.gov/
#   - Australia Group: https://www.australiagroup.net/
#   - WHO Laboratory Biosafety Manual, 4th ed. (2020)

# Database version – increment when accessions are added/updated
version: "1.0.0"
last_updated: "2025-01-15"

# NCBI Entrez configuration
entrez:
  email: "biocompiler-screening@example.org"
  api_key_env: "NCBI_API_KEY"  # Optional: env var name for NCBI API key
  retmax: 10000
  retry_attempts: 3
  retry_delay_seconds: 5
  rate_limit_seconds: 0.4  # NCBI limit: ~3 requests/second without API key

